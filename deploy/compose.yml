services:
  finance-de-api:
    restart: unless-stopped
    build:
      context: ./..
      dockerfile: deploy/api.Dockerfile
    ports:
      # will expose internal docker port 8000 to external port API_PORT
      - "${API_PORT}:8000"
    env_file:
      - path: ./.env
        required: true
    environment:
      - API_HOST=${API_HOST}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@172.17.0.1:${POSTGRES_PORT}/${POSTGRES_DB}
    volumes:
      - api_logs:/app/logs
      - ./../data:/app/data  # share /data folder at root project
    depends_on:
      finance-de-db:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ../src/api
          target: /app/src/api
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8000/api/v1" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - main

  finance-de-db:
    restart: unless-stopped
    image: postgres:18
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      # Volume mount for postgres 18+ images should be in a different place now.
      # See https://github.com/docker-library/postgres/issues/37 for a (long)
      # discussion around this process, and suggestions for how to do so.
      - postgres_data:/var/lib/postgresql
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - main

volumes:
  api_logs:
  postgres_data:

networks:
  main:
    driver: bridge